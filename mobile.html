<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>GRUPO MEGA · Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --mega-laranja:#E8520A; --mega-laranja-cl:#F4885A; --mega-laranja-bg:#FFF3EE;
  --mega-cinza-esc:#1E1E1E; --mega-cinza-med:#3A3A3A; --mega-cinza-sub:#5A5A5A;
  --mega-cinza-bdr:#D0D0D0; --mega-cinza-bg:#F5F5F5; --mega-branco:#FFFFFF;
  --mega-verde:#1A7A3C; --mega-verde-cl:#D4EDDA;
  --mega-vermelho:#C0392B; --mega-vermelho-cl:#FADBD8;
  --mega-amarelo:#D4890A; --mega-amarelo-cl:#FEF3CD;
  --mega-azul:#1A4A6E; --mega-azul-cl:#D1E8F5;
  --font-display:'Barlow Condensed',sans-serif; --font-body:'DM Sans',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --radius-sm:6px; --radius-md:10px; --radius-lg:18px;
  --shadow-card:0 2px 8px rgba(0,0,0,.10); --shadow-deep:0 8px 32px rgba(0,0,0,.25);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:var(--font-body);background:var(--mega-cinza-bg);color:var(--mega-cinza-esc);padding-bottom:78px;}
h1,h2,h3{font-family:var(--font-display);}
button{font-family:var(--font-body);cursor:pointer;}
input,select,textarea{font-family:var(--font-body);font-size:16px;}
.mono{font-family:var(--font-mono);}
a.applink{color:#aaa;font-size:12px;text-decoration:underline;}

.top-bar{background:var(--mega-cinza-esc);border-bottom:3px solid var(--mega-laranja);padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;}
.top-bar .brand{font-family:var(--font-display);font-size:19px;font-weight:800;color:var(--mega-laranja);letter-spacing:1px;}
.top-bar .right{display:flex;align-items:center;gap:10px;color:#eee;font-size:12px;}
.btn-logout{background:transparent;border:1px solid #555;color:#ccc;padding:6px 10px;border-radius:var(--radius-sm);font-size:11px;}

.wrap{max-width:600px;margin:0 auto;padding:14px;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--mega-cinza-esc);border-top:2px solid #333;
  display:flex;z-index:60;padding-bottom:env(safe-area-inset-bottom,0);}
.bottom-nav button{flex:1;background:none;border:none;color:#999;padding:10px 4px 8px;display:flex;flex-direction:column;
  align-items:center;gap:3px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;font-family:var(--font-display);}
.bottom-nav button .ic{font-size:20px;}
.bottom-nav button.active{color:var(--mega-laranja);}

.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.kpi-grid.g3{grid-template-columns:repeat(3,1fr);}
.kpi-card{background:var(--mega-cinza-esc);border-left:4px solid var(--mega-laranja);padding:14px;border-radius:var(--radius-md);}
.kpi-label{font-family:var(--font-display);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#999;}
.kpi-value{font-family:var(--font-display);font-size:28px;font-weight:700;color:#fff;line-height:1.1;margin-top:4px;}
.card{background:#fff;border-radius:var(--radius-md);box-shadow:var(--shadow-card);padding:16px;margin-bottom:14px;}
.card.clickable{cursor:pointer;transition:transform .12s;}
.card.clickable:active{transform:scale(0.98);}

.section-header{padding:12px 16px;background:var(--mega-cinza-esc);color:#fff;border-left:5px solid var(--mega-laranja);
  font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  border-radius:var(--radius-sm);margin-bottom:12px;}

.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--font-display);
  letter-spacing:.5px;text-transform:uppercase;display:inline-block;white-space:nowrap;}
.badge-ok{background:var(--mega-verde-cl);color:var(--mega-verde);}
.badge-pendente{background:var(--mega-amarelo-cl);color:var(--mega-amarelo);}
.badge-critico{background:var(--mega-vermelho-cl);color:var(--mega-vermelho);}
.badge-andamento{background:var(--mega-azul-cl);color:var(--mega-azul);}
.badge-concluido{background:#E8E8E8;color:#3A3A3A;}

.btn{border:none;padding:12px 18px;border-radius:var(--radius-sm);font-weight:700;font-size:14px;font-family:var(--font-body);min-height:44px;}
.btn-primary{background:var(--mega-laranja);color:#fff;}
.btn-secondary{background:#fff;color:var(--mega-cinza-esc);border:1px solid var(--mega-cinza-bdr);}
.btn-verde{background:var(--mega-verde);color:#fff;}
.btn-vermelho{background:var(--mega-vermelho);color:#fff;}
.btn-sm{padding:8px 14px;font-size:12px;min-height:36px;}
.btn:disabled{opacity:.45;}
.btn-block{width:100%;}
.btn-icon{width:38px;height:38px;border-radius:var(--radius-sm);border:1px solid var(--mega-cinza-bdr);background:#fff;font-size:16px;}
.btn-icon.danger{color:var(--mega-vermelho);border-color:var(--mega-vermelho-cl);}

.form-grid{display:grid;grid-template-columns:1fr;gap:12px;}
.form-grid.g2{grid-template-columns:1fr 1fr;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--mega-cinza-sub);}
.field input,.field select,.field textarea{padding:12px;border:1px solid var(--mega-cinza-bdr);border-radius:var(--radius-sm);background:#fff;min-height:44px;}
.field textarea{resize:vertical;min-height:70px;}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--mega-cinza-esc);padding:20px;}
.login-card{background:#fff;border-radius:var(--radius-lg);padding:28px 22px;width:100%;max-width:420px;box-shadow:var(--shadow-deep);}
.login-card .brand{text-align:center;font-family:var(--font-display);font-size:26px;font-weight:800;color:var(--mega-laranja);letter-spacing:2px;}
.login-card .tag{text-align:center;font-size:11px;color:var(--mega-cinza-sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;}
.user-pick{max-height:260px;overflow-y:auto;border:1px solid var(--mega-cinza-bdr);border-radius:var(--radius-sm);margin-bottom:14px;}
.user-pick .u{padding:14px 12px;border-bottom:1px solid #eee;font-size:15px;display:flex;justify-content:space-between;min-height:48px;align-items:center;}
.user-pick .u.sel{background:var(--mega-laranja);color:#fff;}
.err-msg{background:var(--mega-vermelho-cl);color:var(--mega-vermelho);padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;}

.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.foto-grid img{width:100%;height:90px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--mega-cinza-bdr);}
.foto-item{position:relative;}
.foto-item .del{position:absolute;top:2px;right:2px;width:22px;height:22px;border-radius:50%;background:rgba(192,57,43,.9);color:#fff;border:none;font-size:12px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;}
.modal-panel{background:var(--mega-cinza-bg);width:100%;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;box-shadow:var(--shadow-deep);}
.modal-head{background:var(--mega-cinza-esc);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;border-radius:18px 18px 0 0;}
.modal-body{padding:16px;}
.sheet-item{padding:16px;background:#fff;border-radius:var(--radius-sm);margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:12px;font-size:15px;}
.sheet-item:active{background:var(--mega-laranja-bg);}

.timeline{border-left:2px solid var(--mega-cinza-bdr);padding-left:14px;margin-left:4px;}
.timeline .ev{margin-bottom:12px;position:relative;}
.timeline .ev::before{content:'';position:absolute;left:-19px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--mega-laranja);}
.timeline .ev .t{font-size:11px;color:var(--mega-cinza-sub);font-family:var(--font-mono);}
.timeline .ev .d{font-size:13px;font-weight:600;}

.muted{color:var(--mega-cinza-sub);font-size:13px;}
.flex-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.divider{height:1px;background:var(--mega-cinza-bdr);margin:14px 0;}
.empty-state{text-align:center;padding:30px 16px;color:var(--mega-cinza-sub);}
.spinner{border:3px solid #eee;border-top:3px solid var(--mega-laranja);border-radius:50%;width:22px;height:22px;animation:spin 0.8s linear infinite;margin:16px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--mega-vermelho);display:inline-block;margin-left:2px;}

#toast-holder{position:fixed;bottom:82px;left:0;right:0;display:flex;justify-content:center;z-index:400;pointer-events:none;}
.toast{background:var(--mega-cinza-esc);color:#fff;padding:12px 20px;border-radius:var(--radius-md);box-shadow:var(--shadow-deep);
  margin-bottom:10px;font-size:13px;border-left:4px solid var(--mega-laranja);max-width:90%;}

.chip-group{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:11px 16px;border-radius:20px;border:2px solid var(--mega-cinza-bdr);background:#fff;font-size:13px;font-weight:600;color:var(--mega-cinza-med);min-height:44px;}
.chip.sel{background:var(--mega-laranja);border-color:var(--mega-laranja);color:#fff;}
.chip-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
.chip-scroll .chip{white-space:nowrap;flex-shrink:0;}

.stepper{display:flex;align-items:center;gap:8px;}
.stepper button{width:46px;height:46px;border-radius:var(--radius-sm);border:2px solid var(--mega-cinza-bdr);background:#fff;font-size:22px;font-weight:700;}
.stepper button:active{background:var(--mega-laranja-bg);border-color:var(--mega-laranja);}
.stepper input{width:80px;height:46px;text-align:center;font-size:17px;font-weight:700;border:2px solid var(--mega-cinza-bdr);border-radius:var(--radius-sm);}

.photo-widget{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;}
.pw-thumb{position:relative;width:92px;height:92px;}
.pw-thumb img{width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--mega-cinza-bdr);}
.pw-thumb button{position:absolute;top:-6px;right:-6px;width:24px;height:24px;border-radius:50%;background:var(--mega-vermelho);color:#fff;border:none;font-size:13px;}
.btn-add-photo{width:92px;height:92px;border:2px dashed var(--mega-cinza-bdr);border-radius:var(--radius-sm);background:#fafafa;
  font-size:26px;color:var(--mega-cinza-sub);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.btn-add-photo span{font-size:10px;font-weight:700;text-transform:uppercase;}

.item-row{background:#fafafa;border:1px solid var(--mega-cinza-bdr);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;}
.item-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.perm-check{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.perm-check input{width:20px;height:20px;}

.mcard{background:#fff;border-radius:var(--radius-md);box-shadow:var(--shadow-card);padding:14px 16px;margin-bottom:10px;border-left:4px solid var(--mega-azul);}
.mcard.crit-critica{border-left-color:var(--mega-vermelho);}
.mcard.crit-alta{border-left-color:var(--mega-amarelo);}
.mcard .mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px;}
.mcard .mc-num{font-family:var(--font-mono);font-size:12px;color:var(--mega-cinza-sub);}
.mcard .mc-title{font-size:15px;font-weight:700;margin-bottom:6px;}
.mcard .mc-meta{font-size:12px;color:var(--mega-cinza-sub);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.mcard .mc-actions{display:flex;gap:8px;margin-top:10px;}
</style>
</head>

async function sb(path, opts={}){
  const headers = {apikey:SUPABASE_ANON_KEY, Authorization:`Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type':'application/json'};
  if(opts.prefer) headers['Prefer']=opts.prefer;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {method:opts.method||'GET', headers, body:opts.body?JSON.stringify(opts.body):undefined});
  if(!res.ok){ let t; try{t=await res.json();}catch(e){t=await res.text();} throw new Error(t.message||JSON.stringify(t)); }
  if(res.status===204) return null;
  const txt = await res.text();
  return txt? JSON.parse(txt): null;
}
async function sbRpc(fn, params){ return sb(`rpc/${fn}`, {method:'POST', body:params}); }
async function uploadFoto(file, path){
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/fotos-os/${path}`, {
    method:'POST',
    headers:{apikey:SUPABASE_ANON_KEY, Authorization:`Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': file.type||'application/octet-stream'},
    body:file
  });
  if(!res.ok){ throw new Error('Falha ao enviar foto'); }
  return `${SUPABASE_URL}/storage/v1/object/public/fotos-os/${path}`;
}
async function uploadArquivo(file, path, bucket){
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${path}`, {
    method:'POST',
    headers:{apikey:SUPABASE_ANON_KEY, Authorization:`Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': file.type||'application/octet-stream'},
    body:file
  });
  if(!res.ok){ throw new Error('Falha ao enviar arquivo'); }
  return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`;
}

/* ==========================================================
   COMPONENTES DE TOQUE — não chamam render() global, manipulam
   o DOM diretamente para nunca perder o que já foi digitado.
   ========================================================== */
function chipGroup(name, list, selected, onSelectExtra){
  return `<div class="chip-group" data-field="${esc(name)}">
    ${list.map(([v,l])=>`<button type="button" class="chip ${v===selected?'sel':''}" data-value="${esc(v)}" onclick="selectChip(this)${onSelectExtra?';'+onSelectExtra+'(this.dataset.value)':''}">${esc(l)}</button>`).join('')}
    <input type="hidden" name="${esc(name)}" value="${esc(selected||'')}">
  </div>`;
}
function selectChip(btn){
  const group = btn.closest('.chip-group');
  group.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
  btn.classList.add('sel');
  group.querySelector('input[type=hidden]').value = btn.dataset.value;
}
function chipMultiGroup(name, list, selectedArr){
  selectedArr = selectedArr||[];
  return `<div class="chip-group" data-field="${esc(name)}">
    ${list.map(l=>`<button type="button" class="chip ${selectedArr.includes(l)?'sel':''}" data-value="${esc(l)}" onclick="toggleChip(this)">${esc(l)}</button>`).join('')}
    <input type="hidden" name="${esc(name)}" value="${esc(selectedArr.join('|'))}">
  </div>`;
}
function toggleChip(btn){
  btn.classList.toggle('sel');
  const group = btn.closest('.chip-group');
  const vals = [...group.querySelectorAll('.chip.sel')].map(c=>c.dataset.value);
  group.querySelector('input[type=hidden]').value = vals.join('|');
}
function stepperField(name, value, step, min, decimals){
  value = value==null||value===''?0:value;
  return `<div class="stepper" data-step="${step}" data-min="${min??0}" data-dec="${decimals||0}">
    <button type="button" onclick="stepChange(this,-1)">−</button>
    <input type="number" name="${esc(name)}" value="${value}" step="${step}">
    <button type="button" onclick="stepChange(this,1)">+</button>
  </div>`;
}
function stepChange(btn, dir){
  const wrap = btn.parentElement;
  const inp = wrap.querySelector('input');
  const step = parseFloat(wrap.dataset.step)||1;
  const min = parseFloat(wrap.dataset.min)||0;
  const dec = parseInt(wrap.dataset.dec)||0;
  let v = (parseFloat(inp.value)||0) + step*dir;
  if(v<min) v=min;
  inp.value = dec>0? v.toFixed(dec) : Math.round(v);
}
window.pendingFiles = {};
function photoWidget(key){
  if(!window.pendingFiles[key]) window.pendingFiles[key]=[];
  return `<div class="photo-widget" id="pw-${key}">
    <div id="pw-thumbs-${key}" style="display:contents;">${renderPwThumbs(key)}</div>
    <button type="button" class="btn-add-photo" onclick="document.getElementById('pw-input-${key}').click()">📷<span>Foto</span></button>
    <input type="file" id="pw-input-${key}" accept="image/*" capture="environment" style="display:none" onchange="onPhotoPicked('${key}',this)">
  </div>`;
}
function renderPwThumbs(key){
  return (window.pendingFiles[key]||[]).map((f,i)=>`<div class="pw-thumb"><img src="${f.__preview}"><button type="button" onclick="removePendingPhoto('${key}',${i})">✕</button></div>`).join('');
}
function onPhotoPicked(key, input){
  const f = input.files[0];
  if(!f) return;
  f.__preview = URL.createObjectURL(f);
  window.pendingFiles[key].push(f);
  const holder = document.getElementById('pw-thumbs-'+key);
  if(holder) holder.innerHTML = renderPwThumbs(key);
  input.value='';
}
function removePendingPhoto(key, idx){
  window.pendingFiles[key].splice(idx,1);
  const holder = document.getElementById('pw-thumbs-'+key);
  if(holder) holder.innerHTML = renderPwThumbs(key);
}
function clearPending(key){ window.pendingFiles[key]=[]; }

function itensFromForm(fd){
  const servicos=fd.getAll('item_servico'), unidades=fd.getAll('item_unidade'), metas=fd.getAll('item_meta'), obs=fd.getAll('item_obs');
  const rows=[];
  for(let i=0;i<servicos.length;i++){
    if(servicos[i]) rows.push({servico:servicos[i], unidade:unidades[i]||null, quantidade_prevista:metas[i]||null, observacao:obs[i]||null});
  }
  return rows;
}

/* TOAST — fora do ciclo de render, nunca apaga formulário aberto */
function toast(msg){
  const holder = document.getElementById('toast-holder');
  if(!holder) return;
  holder.innerHTML = `<div class="toast">${esc(msg)}</div>`;
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ holder.innerHTML=''; }, 3200);
}

async function doLogin(){
  if(!S.loginUsuarioEncontrado || !S.pin){ S.error='Informe sua matrícula e o PIN.'; render(); return; }
  S.loading=true; S.error=null; render();
  try{
    const r = await sbRpc('rpc_login',{p_usuario_id:S.loginUsuarioEncontrado.id, p_pin:S.pin});
    if(!r || r.length===0){ S.error='PIN incorreto.'; S.loading=false; render(); return; }
    S.user = r[0];
    await loadBaseData();
    const full = S.usuarios.find(u=>u.id===S.user.id);
    const plataforma = full?.plataforma_acesso || 'ambos';
    if(plataforma!=='ambos' && plataforma!==CURRENT_PLATFORM){
      const destino = plataforma==='desktop' ? './desktop.html' : './mobile.html';
      window.location.href = destino + '?login=' + S.user.id;
      return;
    }
    S.user.permissoes = (full && full.permissoes && Object.keys(full.permissoes).length) ? full.permissoes : defaultPermissoes(S.user.perfil);
    S.user.obras_acesso = full?.obras_acesso || [];
    if(full){ S.user.data_nascimento=full.data_nascimento; S.user.estado_civil=full.estado_civil; S.user.naturalidade=full.naturalidade;
      S.user.rg=full.rg; S.user.telefone_whatsapp=full.telefone_whatsapp; S.user.data_admissao=full.data_admissao; S.user.cargo=full.cargo; }
    if(S.user.obras_acesso.length>0){
      const permitidas = new Set(S.user.obras_acesso);
      S.obras = S.obras.filter(o=>permitidas.has(o.id));
      S.equipes = S.equipes.filter(e=>!e.obra_id || permitidas.has(e.obra_id));
      S.veiculos = S.veiculos.filter(v=>!v.obra_id || permitidas.has(v.obra_id));
      S.equipamentos = S.equipamentos.filter(e=>!e.obra_id || permitidas.has(e.obra_id));
    }
    await loadNotificacoes();
    await carregarAlertasResumo();
    await loadOSList();
    S.view = canAccess('dashboard') ? 'dashboard' : 'lista';
    S.pin=''; S.loginSel=null; S.loginUsuarioEncontrado=null; S.loginMatricula='';
  }catch(e){ S.error='Erro ao entrar: '+e.message; }
  S.loading=false; render();
}
function doLogout(){ S.user=null; S.view='login'; S.osList=[]; S.currentOS=null;
  S.checklistsLoaded=false; S.veiculoUsosLoaded=false; S.minhasNotasLoaded=false; S.todasNotasLoaded=false;
  S.checklists=[]; S.veiculoUsos=[]; S.minhasNotas=[]; S.todasNotas=[];
  render(); }

async function criarOS(form){
  const itens = itensFromForm(new FormData(form));
  if(itens.length===0){ toast('Adicione ao menos um item de serviço com meta de produção.'); return; }
  const fd = new FormData(form);
  const servicoResumo = itens.map(i=>i.servico).join(' + ');
  const payload = {
    obra_id: fd.get('obra_id'), equipe_id: fd.get('equipe_id')||null,
    contrato: fd.get('contrato')||null,
    data_programada: fd.get('data_programada')||null,
    prazo_retorno: fd.get('prazo_retorno')||null,
    pista: fd.get('pista')||null, sentido: fd.get('sentido')||null, faixa: fd.get('faixa')||null,
    km_inicial: fd.get('km_inicial')||null, km_final: fd.get('km_final')||null,
    servico: servicoResumo, descricao: fd.get('descricao')||null,
    criticidade: fd.get('criticidade')||'media',
    responsavel_criacao_id: S.user.id, responsavel_escritorio_id: S.user.id,
    observacoes: fd.get('observacoes')||null
  };
  S.loading=true; render();
  try{
    const created = await sb('ordens_servico', {method:'POST', body:payload, prefer:'return=representation'});
    const os = created[0];
    for(const it of itens){
      await sb('itens_os',{method:'POST', body:{ordem_servico_id:os.id, servico:it.servico, unidade:it.unidade,
        quantidade_prevista:it.quantidade_prevista||null, observacao:it.observacao||null}});
    }
    const files = window.pendingFiles['antes_nova']||[];
    for(let i=0;i<files.length;i++){
      const f=files[i]; const path=`${os.id}/antes/${Date.now()}_${i}_${f.name}`;
      try{ const url = await uploadFoto(f, path); await sb('fotos',{method:'POST', body:{ordem_servico_id:os.id, tipo_foto:'antes', arquivo_url:url, usuario_id:S.user.id}}); }
      catch(e){ console.error('foto falhou', e); }
    }
    clearPending('antes_nova');
    toast(`OS ${os.numero_os} criada com sucesso.`);
    S.view='lista'; await loadOSList();
  }catch(e){ toast('Erro ao criar OS: '+e.message); }
  S.loading=false; render();
}

async function finalizarAtividade(form){
  const key = 'depois_'+S.currentOS.id;
  const fotosFiles = window.pendingFiles[key]||[];
  if(fotosFiles.length===0){ toast('É necessário ao menos 1 foto da execução.'); return; }
  const fd = new FormData(form);
  S.loading=true; render();
  try{
    for(let i=0;i<fotosFiles.length;i++){
      const f=fotosFiles[i]; const path = `${S.currentOS.id}/depois/${Date.now()}_${i}_${f.name}`;
      const url = await uploadFoto(f, path);
      await sb('fotos',{method:'POST', body:{ordem_servico_id:S.currentOS.id, tipo_foto:'depois', arquivo_url:url, usuario_id:S.user.id}});
    }
    const retorno = {
      ordem_servico_id: S.currentOS.id, equipe_id: S.currentOS.equipe_id, responsavel_id: S.user.id,
      data_execucao: fd.get('data_execucao')||new Date().toISOString().slice(0,10),
      hora_inicio: fd.get('hora_inicio')||null, hora_fim: new Date().toISOString(),
      km_inicial_executado: fd.get('km_inicial_executado')||null, km_final_executado: fd.get('km_final_executado')||null,
      informacoes_adicionais: fd.get('informacoes_adicionais')||null,
      materiais_utilizados: fd.get('materiais_utilizados')||null, equipamentos_utilizados: fd.get('equipamentos_utilizados')||null,
      numero_colaboradores: fd.get('numero_colaboradores')||null, condicao_climatica: fd.get('condicao_climatica')||null,
      observacoes: fd.get('observacoes_retorno')||null
    };
    await sb('retornos_equipe',{method:'POST', body:retorno});
    for(const it of S.currentItens){
      const val = fd.get('exec_item_'+it.id);
      if(val===null) continue;
      await sb('medicoes',{method:'POST', body:{ordem_servico_id:S.currentOS.id, item_id:it.id, item:it.servico, unidade:it.unidade,
        quantidade_prevista:it.quantidade_prevista, quantidade_executada:val}});
    }
    clearPending(key);
    await atualizarStatusOS(S.currentOS.id,'enviada_conferencia');
    toast('Atividade finalizada e enviada para conferência.');
    await loadOSDetail(S.currentOS.id);
  }catch(e){ toast('Erro ao finalizar: '+e.message); }
  S.loading=false; render();
}

async function loadVeiculoUsos(){
  S.veiculoUsos = await sb('veiculo_usos?select=*&order=data_checkin.desc&limit=200');
  S.veiculoUsosLoaded = true;
}
async function loadUsoDetail(id){
  const [uso,itens] = await Promise.all([
    sb(`veiculo_usos?id=eq.${id}&select=*`),
    sb(`veiculo_uso_itens?uso_id=eq.${id}&order=criado_em.asc`)
  ]);
  S.currentUso = uso[0]; S.currentUsoItens = itens;
}
async function criarCheckin(form){
  const fd = new FormData(form);
  const veiculo_id = fd.get('veiculo_id');
  if(!veiculo_id){ toast('Selecione o veículo.'); return; }
  S.loading=true; render();
  try{
    const abertos = await sb(`veiculo_usos?veiculo_id=eq.${veiculo_id}&status=eq.aberto&select=id`);
    if(abertos.length>0){ toast('Este veículo já está em uso — faça o check-out antes de um novo check-in.'); S.loading=false; render(); return; }
    const payload = {
      veiculo_id, motorista_id: S.user.id, motorista_nome: fd.get('motorista_nome')||S.user.nome,
      km_inicial: fd.get('km_inicial')||null, observacao_checkin: fd.get('observacao_checkin')||null, status:'aberto'
    };
    const created = await sb('veiculo_usos',{method:'POST',body:payload,prefer:'return=representation'});
    const uso = created[0];
    const itens = [];
    VEICULO_DOC_ITENS.forEach((t,i)=>itens.push({categoria:'documentacao', item_texto:t, check_in: fd.get('doc_'+i)==='ok'}));
    VEICULO_INVENTARIO_ITENS.forEach((t,i)=>itens.push({categoria:'inventario', item_texto:t, check_in: fd.get('inv_'+i)==='ok'}));
    VEICULO_PINTURA_ITENS.forEach((t,i)=>itens.push({categoria:'pintura', item_texto:t, check_in: fd.get('pint_'+i)==='ok'}));
    VEICULO_CONDICOES_ITENS.forEach((t,i)=>itens.push({categoria:'condicoes', item_texto:t, check_in: fd.get('cond_'+i)==='ok'}));
    VEICULO_SINALIZACAO_ITENS.forEach((t,i)=>itens.push({categoria:'sinalizacao', item_texto:t, valor_texto: fd.get('sinal_'+i)||null}));
    itens.push({categoria:'equipamento_extra', item_texto:'Caixa de Ferramenta', valor_texto: fd.get('caixa_ferramenta')||null});
    for(const it of itens){ await sb('veiculo_uso_itens',{method:'POST',body:{uso_id:uso.id, ...it}}); }
    toast('Check-in registrado com sucesso.');
    S.veiculoUsoView='pendentes'; await loadVeiculoUsos();
  }catch(e){ toast('Erro ao registrar check-in: '+e.message); }
  S.loading=false; render();
}
async function abrirCheckout(id){
  S.loading=true; render();
  try{ await loadUsoDetail(id); S.veiculoUsoView='checkout'; }
  catch(e){ toast('Erro: '+e.message); }
  S.loading=false; render();
}
async function finalizarCheckout(form){
  const fd = new FormData(form);
  S.loading=true; render();
  try{
    for(const it of S.currentUsoItens){
      if(it.categoria==='sinalizacao' || it.categoria==='equipamento_extra') continue;
      const val = fd.get('out_'+it.id);
      if(val===null) continue;
      await sb(`veiculo_uso_itens?id=eq.${it.id}`,{method:'PATCH',body:{check_out: val==='ok'}});
    }
    await sb(`veiculo_usos?id=eq.${S.currentUso.id}`,{method:'PATCH',body:{
      status:'fechado', data_checkout:new Date().toISOString(), km_final: fd.get('km_final')||null,
      observacao_checkout: fd.get('observacao_checkout')||null,
      assinatura_cco: fd.get('assinatura_cco')||null, assinatura_motorista: fd.get('assinatura_motorista')||S.user.nome,
      assinatura_gerente: fd.get('assinatura_gerente')||null
    }});
    toast('Check-out registrado com sucesso.');
    S.veiculoUsoView='historico'; await loadVeiculoUsos();
  }catch(e){ toast('Erro ao registrar check-out: '+e.message); }
  S.loading=false; render();
}
async function excluirUso(id){
  if(!confirm('Excluir este registro de check-in/check-out?')) return;
  try{ await sb(`veiculo_usos?id=eq.${id}`,{method:'DELETE'}); toast('Registro excluído.'); await loadVeiculoUsos(); }
  catch(e){ toast('Erro: '+e.message); }
  render();
}

async function buscarPorMatricula(){
  const mat = (S.loginMatricula||'').trim();
  if(!mat){ S.error='Digite sua matrícula.'; render(); return; }
  S.loading=true; S.error=null; render();
  try{
    const r = await sbRpc('rpc_buscar_por_matricula',{p_matricula:mat});
    if(!r || !r.length){ S.error='Matrícula não encontrada.'; S.loginUsuarioEncontrado=null; }
    else if(r[0].status!=='ativo'){ S.error='Usuário inativo. Procure o RH.'; S.loginUsuarioEncontrado=null; }
    else { S.loginUsuarioEncontrado=r[0]; S.error=null; }
  }catch(e){ S.error='Erro: '+e.message; }
  S.loading=false; render();
}
function trocarMatricula(){ S.loginUsuarioEncontrado=null; S.loginMatricula=''; S.pin=''; S.error=null; render(); }

async function carregarAlertasResumo(){
  try{
    const [avisosRecebidos, avisosLidos, solicitacoesDoc] = await Promise.all([
      sb(`avisos?select=id&or=(destino.eq.todos,usuario_id.eq.${S.user.id})&order=criado_em.desc&limit=200`),
      sb(`avisos_leituras?select=aviso_id&usuario_id=eq.${S.user.id}`),
      sb(`solicitacoes_documentos?select=id&usuario_id=eq.${S.user.id}&status=eq.aberta`),
    ]);
    const lidosSet = new Set(avisosLidos.map(l=>l.aviso_id));
    const mensagens = avisosRecebidos.filter(a=>!lidosSet.has(a.id)).length;
    const osNovas = (S.osList||[]).filter(o=>o.status==='enviada_equipe').length;
    S.alertasResumo = {mensagens, documentos:solicitacoesDoc.length, osNovas};
  }catch(e){}
  render();
}

function irPara(destino){
  S.showMais=false;
  if(destino==='checklist_historico'){ S.view='checklists'; S.checklistView='historico'; loadChecklists().then(render); return; }
  if(destino.startsWith('cadastro_')){ S.view='cadastros'; S.cadastroTab=destino.replace('cadastro_',''); render(); return; }
  if(destino==='rh'){ S.view='rh'; carregarRHTab(S.rhTab); return; }
  if(destino==='veiculo_checkin'){ S.view='veiculo_checkin'; S.veiculoUsoView='pendentes'; loadVeiculoUsos().then(render); return; }
  if(destino==='lista'){ S.view='lista'; loadOSList().then(render); return; }
  if(destino==='suprimentos'){ S.view='suprimentos'; carregarSuprimentosTab(S.suprimentosTab); return; }
  if(destino==='dre_sinalizacao'){ S.view='dre_sinalizacao'; render(); return; }
  if(destino==='epi'){ S.view='epi'; carregarEpiTab(S.epiTab); return; }
  if(destino==='mensagens'){ S.view='mensagens'; carregarMensagens(); return; }
  if(destino==='rdo'){ S.view='rdo'; S.rdoView='novo'; render(); return; }
  S.view=destino; render();
}

function renderFinanceiroMeuPainel(){
  if(!S.minhasNotasLoaded){ S.minhasNotasLoaded=true; loadMinhasNotas().then(render).catch(e=>{toast('Erro ao carregar notas: '+e.message); render();}); }
  const list = S.minhasNotas;
  const cnt = s=>list.filter(n=>n.status===s).length;
  const somaAprovado = list.filter(n=>n.status==='aprovado').reduce((a,n)=>a+(parseFloat(n.valor)||0),0);
  return `
  <div class="kpi-grid" style="grid-template-columns:repeat(2,1fr);">
    <div class="kpi-card"><div class="kpi-label">Enviadas</div><div class="kpi-value">${list.length}</div></div>

    <div class="kpi-card"><div class="kpi-label">Total Aprovado</div><div class="kpi-value" style="font-size:18px;">${fmtMoney(somaAprovado)}</div></div>
  </div>
  ${list.map(n=>`<div class="mcard" onclick="abrirNota('${n.id}','meu_painel')">
    <div class="mc-top"><span>${esc(n.tipo_despesa||'Despesa')}</span>${finStatusBadge(n.status)}</div>

  </div>`).join('') || '<div class="empty-state">Nenhuma nota enviada ainda.</div>'}`;
}
function renderFinanceiroGeral(){
  if(!S.todasNotasLoaded){ S.todasNotasLoaded=true; loadTodasNotas().then(render).catch(e=>{toast('Erro ao carregar notas: '+e.message); render();}); }
  const list = S.todasNotas;
  const cnt = s=>list.filter(n=>n.status===s).length;
  const somaAprovado = list.filter(n=>n.status==='aprovado').reduce((a,n)=>a+(parseFloat(n.valor)||0),0);
  const um = usuMap();
  const porColab = {};
  list.forEach(n=>{ const k=n.usuario_id; porColab[k]=porColab[k]||{total:0,aprovado:0,soma:0}; porColab[k].total++; if(n.status==='aprovado'){porColab[k].aprovado++; porColab[k].soma+=parseFloat(n.valor)||0;} });
  const pendentesRevisao = list.filter(n=>n.status==='enviado'||n.status==='atencao');
  return `
  <div class="kpi-grid" style="grid-template-columns:repeat(2,1fr);">
    <div class="kpi-card"><div class="kpi-label">Total</div><div class="kpi-value">${list.length}</div></div>
    <div class="kpi-card" style="border-left-color:var(--mega-amarelo);"><div class="kpi-label">Aguard./Atenção</div><div class="kpi-value">${pendentesRevisao.length}</div></div>
    <div class="kpi-card" style="border-left-color:var(--mega-verde);"><div class="kpi-label">Aprovadas</div><div class="kpi-value">${cnt('aprovado')}</div></div>
    <div class="kpi-card"><div class="kpi-label">Total Aprovado</div><div class="kpi-value" style="font-size:16px;">${fmtMoney(somaAprovado)}</div></div>
  </div>
  <div class="section-header">Aguardando Ação (${pendentesRevisao.length})</div>
  ${pendentesRevisao.map(n=>`<div class="mcard" onclick="abrirNota('${n.id}','geral')">
    <div class="mc-top"><span>${esc(um[n.usuario_id]?.nome||'—')}</span>${finStatusBadge(n.status)}</div>

function isRHStaff(){ return S.user && (S.user.perfil==='administrador'||S.user.perfil==='departamento_pessoal'); }
function renderRH(){
  const tabs=[['pessoas','Meus Dados'],['atestados','Atestados'],['ponto','Ponto'],['documentos','Documentos'],['indicacoes','Indique um Amigo']];
  return `<div class="wrap">
    <div class="section-header">Pessoas / RH</div>

      ${tabs.map(([k,l])=>`<button class="btn ${S.rhTab===k?'btn-primary':'btn-secondary'} btn-sm" onclick="S.rhTab='${k}';carregarRHTab('${k}');">${l}</button>`).join('')}
    </div>
    ${S.rhTab==='pessoas'?renderPessoas():''}
    ${S.rhTab==='atestados'?renderAtestados():''}
    ${S.rhTab==='ponto'?renderPonto():''}
    ${S.rhTab==='documentos'?renderDocumentos():''}
    ${S.rhTab==='indicacoes'?renderIndicacoes():''}
  </div>`;
}
function carregarRHTab(tab){
  S.view='rh'; S.rhTab=tab; S.loading=true; render();
  const done=()=>{ S.loading=false; render(); };
  const fail=e=>{ toast('Erro: '+e.message); done(); };
  if(tab==='pessoas'){ isRHStaff()? loadSolicitacoesCadastrais().then(done).catch(fail) : done(); }
  else if(tab==='atestados'){ loadAtestados().then(done).catch(fail); }
  else if(tab==='ponto'){ loadMeuPonto().then(done).catch(fail); }
  else if(tab==='documentos'){ Promise.all([loadDocumentos(), isRHStaff()?loadSolicitacoesDocumentosRH():loadMinhasSolicitacoesDocumentos()]).then(done).catch(fail); }
  else if(tab==='indicacoes'){ loadIndicacoes().then(done).catch(fail); }
  else done();
}

async function enviarAtestado(form){
  const fd = new FormData(form);
  const files = window.pendingFiles['atestado_arquivo']||[];
  S.loading=true; render();
  try{
    let arquivoUrl=null;
    if(files[0]) arquivoUrl = await uploadArquivo(files[0], `${S.user.id}/${Date.now()}_${files[0].name}`, 'atestados');
    const ini=fd.get('afastamento_inicio'), fim=fd.get('afastamento_fim');
    let dias=null; if(ini&&fim){ dias=Math.round((new Date(fim)-new Date(ini))/86400000)+1; }
    const payload={usuario_id:S.user.id, data_emissao:fd.get('data_emissao')||null, afastamento_inicio:ini||null, afastamento_fim:fim||null,
      quantidade_dias:dias, tipo_documento:fd.get('tipo_documento')||null, observacao:fd.get('observacao')||null, arquivo:arquivoUrl, status:'enviado'};
    await sb('atestados',{method:'POST',body:payload});
    clearPending('atestado_arquivo'); toast('Atestado enviado.'); form.reset(); await loadAtestados();
  }catch(e){ toast('Erro: '+e.message); }
  S.loading=false; render();
}
async function analisarAtestado(id, status){
  const motivo = status==='reprovado' ? prompt('Motivo da reprovação:') : null;

  S.loading=true; render();
  try{
    await sb(`atestados?id=eq.${id}`,{method:'PATCH',body:{status, analisado_por:S.user.id, analisado_em:new Date().toISOString(), motivo_reprovacao:motivo||null}});

    toast('Atestado atualizado.'); await loadAtestados();

  S.loading=false; render();
}

async function publicarDocumento(form){
  const fd = new FormData(form);
  const files = window.pendingFiles['doc_arquivo']||[];
  S.loading=true; render();
  try{
    let arquivoUrl=null;
    if(files[0]) arquivoUrl = await uploadArquivo(files[0], `${Date.now()}_${files[0].name}`, 'documentos-rh');
    const payload={destino:__destinoDocSel, usuario_id:__destinoDocSel==='individual'?(fd.get('usuario_id')||null):null,
      equipe_id:__destinoDocSel==='equipe'?(fd.get('equipe_id')||null):null, obra_id:__destinoDocSel==='obra'?(fd.get('obra_id')||null):null,
      titulo:fd.get('titulo'), categoria:fd.get('categoria')||null, arquivo:arquivoUrl,
      exige_aceite:fd.get('exige_aceite')==='sim', status:'publicado', publicado_por:S.user.id};
    await sb('documentos_colaborador',{method:'POST',body:payload});
    clearPending('doc_arquivo'); toast('Documento publicado.'); form.reset(); await loadDocumentos();
  }catch(e){ toast('Erro: '+e.message); }
  S.loading=false; render();
}
async function responderDocumento(id, decisao){
  const motivo = decisao==='rejeitado' ? prompt('Motivo da rejeição:') : null;
  if(decisao==='rejeitado' && motivo==null) return;
  S.loading=true; render();
  try{
    await sb('aceites_documentos',{method:'POST',body:{documento_id:id, usuario_id:S.user.id, decisao, motivo_rejeicao:motivo||null, dispositivo:navigator.userAgent.slice(0,120)}});
    await sb(`documentos_colaborador?id=eq.${id}`,{method:'PATCH',body:{status:decisao}});
    toast('Resposta registrada.'); await loadDocumentos();
  }catch(e){ toast('Erro: '+e.message); }
  S.loading=false; render();
}

async function criarSolicitacaoDocumentos(form){
  const fd = new FormData(form);
  const itens = (fd.get('itens_lista')||'').split('\n').map(s=>s.trim()).filter(Boolean);
  if(!itens.length){ toast('Informe ao menos um documento, um por linha.'); return; }
  S.loading=true; render();
  try{
    const sol = await sb('solicitacoes_documentos',{method:'POST',prefer:'return=representation',body:{
      solicitante_id:S.user.id, usuario_id:fd.get('usuario_id'), titulo:fd.get('titulo')||null, descricao_geral:fd.get('descricao_geral')||null, status:'aberta'}});
    await sb('solicitacoes_documentos_itens',{method:'POST',body:itens.map(descricao=>({solicitacao_id:sol[0].id, descricao, status:'pendente'}))});
    toast('Solicitação enviada.'); form.reset(); await loadSolicitacoesDocumentosRH();
  }catch(e){ toast('Erro: '+e.message); }
  S.loading=false; render();
}
async function enviarItemSolicitado(itemId, widgetKey){
  const files = window.pendingFiles[widgetKey]||[];
  if(!files[0]){ toast('Selecione o documento (foto ou arquivo) antes de enviar.'); return; }
  S.loading=true; render();
  try{
    const url = await uploadArquivo(files[0], `${S.user.id}/${Date.now()}_${files[0].name}`, 'documentos-rh');
    await sb(`solicitacoes_documentos_itens?id=eq.${itemId}`,{method:'PATCH',body:{status:'enviado', arquivo:url, enviado_em:new Date().toISOString()}});
    clearPending(widgetKey);
    const solicitacao = S.minhasSolicitacoesDoc.find(s=>s.itens.some(i=>i.id===itemId));
    if(solicitacao){
      const restantes = await sb(`solicitacoes_documentos_itens?solicitacao_id=eq.${solicitacao.id}&status=eq.pendente&select=id`);
      if(!restantes.length){ await sb(`solicitacoes_documentos?id=eq.${solicitacao.id}`,{method:'PATCH',body:{status:'concluida'}}); if(S.alertasResumo.documentos>0) S.alertasResumo.documentos--; }
    }
    toast('Documento enviado.'); await loadMinhasSolicitacoesDocumentos();
  }catch(e){ toast('Erro: '+e.message); }
  S.loading=false; render();
}

  const files = window.pendingFiles['dds_fotos']||[];
  S.loading=true; render();

    const fotoUrls=[];
    for(const f of files){ fotoUrls.push(await uploadArquivo(f, `${S.user.id}/${Date.now()}_${f.name}`, 'dds')); }
    await sb('dds_registros',{method:'POST',body:{
      tema_nome:S.ddsTemaAtual.nome, tema_categoria:S.ddsTemaAtual.cat, obra_id:fd.get('obra_id')||null, equipe_id:fd.get('equipe_id')||null,

    clearPending('dds_fotos'); toast('DDS registrado com sucesso.');
    S.ddsTemaAtual=null; S.ddsScreen='sorteio';
  }catch(e){ toast('Erro: '+e.message); }

  if(tab==='materiais') loadMateriais().then(done).catch(fail);

const DRE_LARG_OPTS=[[0.10,'0,10 m'],[0.12,'0,12 m'],[0.15,'0,15 m'],[0.20,'0,20 m'],[0.25,'0,25 m'],['custom','Outro']];
const DRE_CAD_OPTS=[6,8,10,12,15,20,24].map(c=>[c,c+' m']);
const DRE_PROCS={mec_aut:'Mecânica / Automática',manual:'Manual'};
const DRE_BASES={solvente:'Solvente a Frio',agua:'Base Água a Frio',termoplastica:'Termoplástica a Quente'};
function dreFmt(n,d=2){ return isNaN(n)?'—':Number(n).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function dreSet(field,val){
  S.dreForm[field] = (val==='custom'||isNaN(parseFloat(val))||String(val).trim()==='')?val:parseFloat(val);

      <div class="field"><label>Base da tinta</label>${chipGroup('dre_base_pintura',[['solvente','Solvente a Frio'],['agua','Base Água a Frio'],['termoplastica','Termoplástica a Quente']],f.basePintura,"(v=>dreSet('basePintura',v))")}</div>

      ${f.temEixo?`<div class="form-grid">
        <div class="field"><label>Tipo de eixo</label>${chipGroup('dre_tipo_eixo',[['simples','Simples'],['duplo','Duplo']],f.tipoEixo,"(v=>dreSet('tipoEixo',v))")}</div>
        <div class="field"><label>Largura do eixo</label>${chipGroup('dre_larg_eixo',DRE_LARG_OPTS,f.largEixo,"(v=>dreSet('largEixo',v))")}</div>

        <div class="field"><label>Tacha do eixo</label>${chipGroup('dre_tte',[['biamarel','Bi-Amarela'],['bobibranca','Bo-Bi Branca']],f.tipoTE,"(v=>dreSet('tipoTE',v))")}</div>`:''}
        ${f.temBordo?`<div class="field"><label>Cadência bordo</label>${chipGroup('dre_cad_b',DRE_CAD_OPTS,f.cadB,"(v=>dreSet('cadB',v))")}</div>
        <div class="field"><label>Tacha do bordo</label>${chipGroup('dre_ttb',[['biamarel','Bi-Amarela'],['bobibranca','Bo-Bi Branca']],f.tipoTB,"(v=>dreSet('tipoTB',v))")}</div>`:''}

function calcularDre(){
  const f=S.dreForm;
  const ki=parseFloat(f.kmi), kf=parseFloat(f.kmf);
  if(isNaN(ki)||isNaN(kf)||kf<=ki){ toast('KM Final deve ser maior que KM Inicial.'); return; }
  const dk=kf-ki, dm=dk*1000;
  const lE=f.largEixo==='custom'?(parseFloat(f.lEc)||0):parseFloat(f.largEixo);
  const lB=f.largBordo==='custom'?(parseFloat(f.lBc)||0):parseFloat(f.largBordo);
  const aE=f.temEixo?dm*lE*(f.tipoEixo==='duplo'?2:1):0;
  const aB=f.temBordo?dm*lB*2:0;
  const aT=aE+aB;
  const lit=aT/35, e2a=aT*250, e2c=aT*150;
  const cadE=f.cadE||12, cadB=f.cadB||12;
  const qtE=f.temTacha&&f.temEixo?Math.ceil(dm/cadE):0;
  const qtB=f.temTacha&&f.temBordo?Math.ceil(dm/cadB)*2:0;
  const cola=(qtE+qtB)*100;
  const metaPint=f.tipoPintura==='mec_aut'?2500:250;
  const diasP=aT/metaPint;
  const diasT=f.temTacha&&(qtE+qtB)>0?(qtE+qtB)/800:0;
  S.dreRes={dk,dm,aE,aB,aT,lit,e2a,e2c,qtE,qtB,cola,lE,lB,metaPint,diasP,diasT};
  salvarDre();
  render();
}
async function salvarDre(){
  const f=S.dreForm, r=S.dreRes;
  try{
    await sb('dre_sinalizacao',{method:'POST',body:{
      rodovia:f.rod||null, trecho:f.trecho||null, km_inicial:parseFloat(f.kmi), km_final:parseFloat(f.kmf),
      tipo_pintura:f.tipoPintura, base_pintura:f.basePintura, tem_eixo:!!f.temEixo, tipo_eixo:f.tipoEixo, larg_eixo:r.lE,
      tem_bordo:!!f.temBordo, larg_bordo:r.lB, tem_tacha:!!f.temTacha, cad_eixo:f.cadE, cad_bordo:f.cadB,
      tipo_tacha_eixo:f.tipoTE, tipo_tacha_bordo:f.tipoTB, resultado:r, usuario_id:S.user.id}});
  }catch(e){ /* silencioso - resultado já está na tela */ }
}
function renderDreResultado(){
  const f=S.dreForm, r=S.dreRes;
  const tipoTachaLabel=v=>v==='biamarel'?'Bi-Amarela':'Bo-Bi Branca';
  return `<div class="card" style="margin-top:14px;">

    <div class="muted">${esc(f.rod||'—')} · ${esc(f.trecho||'—')} · KM ${dreFmt(parseFloat(f.kmi),3)} → ${dreFmt(parseFloat(f.kmf),3)} (${dreFmt(r.dk,3)} km)</div>
    <div class="flex-row" style="gap:10px;flex-wrap:wrap;margin:10px 0;">
      ${[['ÁREA TOTAL',dreFmt(r.aT,0),'m²'],['EXTENSÃO',dreFmt(r.dm,0),'m'],f.temEixo?['EIXO',dreFmt(r.aE,0),'m²']:null,f.temBordo?['BORDO E+D',dreFmt(r.aB,0),'m²']:null].filter(Boolean)
        .map(([l,v,u])=>`<div style="background:var(--mega-cinza-bg);border-radius:8px;padding:8px 12px;min-width:100px;"><div style="font-size:10px;color:var(--mega-cinza-sub);">${l}</div><div style="font-weight:700;font-size:18px;">${v}</div><div style="font-size:10px;color:var(--mega-cinza-sub);">${u}</div></div>`).join('')}

function carregarEpiTab(tab){
  S.epiTab=tab; S.loading=true; render();
  const done=()=>{ S.loading=false; render(); };
  const fail=e=>{ toast('Erro: '+e.message); done(); };
  const base = Promise.all([loadEpis(), loadEpiEstoque()]);
  if(tab==='cadastro') base.then(done).catch(fail);
  else if(tab==='matriz') base.then(()=>loadEpiMatriz()).then(done).catch(fail);
  else if(tab==='entrega') base.then(()=>loadEpiMatriz()).then(done).catch(fail);
  else if(tab==='estoque') base.then(done).catch(fail);
  else if(tab==='fichas') base.then(()=>loadEpiMovimentacoes()).then(done).catch(fail);
  else base.then(done).catch(fail);
}

async function registrarEntregaEpi(form){
  const fd = new FormData(form);
  const files = window.pendingFiles['epi_fotos']||[];
  if(!files.length){ toast('É obrigatório ao menos 1 foto para confirmar a entrega.'); return; }
  const epi = epiMap()[fd.get('epi_id')];
  const tamanho = fd.get('tamanho')||'único';
  const obraId = fd.get('obra_id')||null;
  const qtd = parseFloat(fd.get('quantidade'));
  const estoqueAtual = (S.epiEstoque||[]).find(e=>e.epi_id===epi.id && e.tamanho===tamanho && e.obra_id===obraId);
  if(!estoqueAtual || estoqueAtual.saldo < qtd){
    if(!confirm(`Estoque disponível: ${estoqueAtual?estoqueAtual.saldo:0}. Confirmar entrega mesmo assim (estoque ficará negativo)?`)) return;
  }
  S.loading=true; render();
  try{
    const fotoUrls=[];
    for(const f of files){ fotoUrls.push(await uploadArquivo(f, `${S.epiColaboradorSel}/${Date.now()}_${f.name}`, 'epi')); }
    let proximaTroca=null;
    if(epi.periodicidade_dias){ const d=new Date(); d.setDate(d.getDate()+epi.periodicidade_dias); proximaTroca=d.toISOString().slice(0,10); }
    await sb('epi_movimentacoes',{method:'POST',body:{epi_id:epi.id, usuario_id:S.epiColaboradorSel, tamanho, obra_id:obraId, quantidade:qtd,
      tipo:'entrega', condicao:fd.get('condicao'), motivo:fd.get('motivo'), fotos:fotoUrls, assinatura_colaborador:fd.get('assinatura_colaborador'),
      coordenador_id:S.user.id, proxima_troca:proximaTroca, criado_por:S.user.id}});
    clearPending('epi_fotos'); toast('Entrega de EPI registrada.'); form.reset(); await loadEpiEstoque();
  }catch(e){ toast('Erro: '+e.message); }
  S.loading=false; render();
}

      ${RDO_MAO_DE_OBRA.map(m=>`<div class="field"><label>${m}</label><input type="number" min="0" name="mo_${m.replace(/[^a-zA-Z]/g,'_')}" value="0"></div>`).join('')}
      <div class="section-header" style="margin:14px 0 8px;">Equipamentos / Veículos</div>
      ${equipVeicList.map(m=>`<div class="field"><label>${m}</label><input type="number" min="0" name="ev_${m.replace(/[^a-zA-Z]/g,'_')}" value="0"></div>`).join('')}
    </div>

    ${S.rdoTipo==='horizontal'?`
    <div class="card">
      <div class="section-header" style="margin:0 0 8px;">Materiais consumidos</div>
      ${RDO_MATERIAIS_HORIZ.map(([nome,un])=>`<div class="field"><label>${nome} (${un})</label><input type="number" step="0.01" min="0" name="mat_${nome.replace(/[^a-zA-Z]/g,'_')}" value="0"></div>`).join('')}
    </div>`:`
    <div class="card">
      <div class="section-header" style="margin:0 0 8px;">Suportes / Materiais</div>
      ${RDO_SUPORTES_VERT.map(m=>{ const k=m.replace(/[^a-zA-Z]/g,'_');
        return `<div class="muted" style="font-weight:700;margin-top:10px;">${m}</div>
        <div class="form-grid">
          <div class="field"><label>Tamanho</label><input name="sup_${k}_tam"></div>
          <div class="field"><label>Estoque</label><input type="number" name="sup_${k}_est"></div>
          <div class="field"><label>Instalado</label><input type="number" name="sup_${k}_ins"></div>
          <div class="field"><label>Saldo</label><input type="number" name="sup_${k}_sal"></div>
        </div>`; }).join('')}
    </div>`}

    <div class="card">
      <div class="section-header" style="margin:0 0 8px;">Localização da atividade / Produção</div>
      ${__rdoProducaoRows.map((row,idx)=>S.rdoTipo==='horizontal'?`
        <div class="card" style="background:var(--mega-cinza-bg);">
          <div class="flex-row" style="justify-content:space-between;"><b>Linha ${idx+1}</b><button type="button" class="btn-icon danger" onclick="rdoRemoverLinhaProducao(${idx})">🗑</button></div>
          <div class="form-grid">
            <div class="field"><label>Tipo</label><input value="${esc(row.tipo)}" oninput="rdoAtualizarLinhaProducao(${idx},'tipo',this.value)"></div>
            <div class="field"><label>Status</label><select onchange="rdoAtualizarLinhaProducao(${idx},'status',this.value)">${opt([['sim','Sim'],['nao','Não'],['parc','Parc.']],row.status)}</select></div>
            <div class="field"><label>Km Inicial</label><input value="${esc(row.km_inicial)}" oninput="rdoAtualizarLinhaProducao(${idx},'km_inicial',this.value)"></div>
            <div class="field"><label>Km Final</label><input value="${esc(row.km_final)}" oninput="rdoAtualizarLinhaProducao(${idx},'km_final',this.value)"></div>
            <div class="field"><label>Pista O/L</label><input value="${esc(row.pista)}" oninput="rdoAtualizarLinhaProducao(${idx},'pista',this.value)"></div>
            <div class="field"><label>Cor B/A</label><input value="${esc(row.cor)}" oninput="rdoAtualizarLinhaProducao(${idx},'cor',this.value)"></div>
            <div class="field"><label>Comp (m)</label><input type="number" step="0.01" value="${esc(row.comp)}" oninput="rdoAtualizarLinhaProducao(${idx},'comp',this.value)"></div>
            <div class="field"><label>Larg (m)</label><input type="number" step="0.01" value="${esc(row.larg)}" oninput="rdoAtualizarLinhaProducao(${idx},'larg',this.value)"></div>
            <div class="field"><label>Área m²</label><input value="${row.area||''}" disabled></div>
          </div>
        </div>`:`
        <div class="card" style="background:var(--mega-cinza-bg);">
          <div class="flex-row" style="justify-content:space-between;"><b>Linha ${idx+1}</b><button type="button" class="btn-icon danger" onclick="rdoRemoverLinhaProducao(${idx})">🗑</button></div>
          <div class="form-grid">
            <div class="field"><label>Tipo Placa</label><input value="${esc(row.tipo_placa)}" oninput="rdoAtualizarLinhaProducao(${idx},'tipo_placa',this.value)"></div>
            <div class="field"><label>Status</label><select onchange="rdoAtualizarLinhaProducao(${idx},'status',this.value)">${opt([['sim','Sim'],['nao','Não'],['parc','Parc.']],row.status)}</select></div>
            <div class="field"><label>Km Inicial</label><input value="${esc(row.km_inicial)}" oninput="rdoAtualizarLinhaProducao(${idx},'km_inicial',this.value)"></div>
            <div class="field"><label>Km Final</label><input value="${esc(row.km_final)}" oninput="rdoAtualizarLinhaProducao(${idx},'km_final',this.value)"></div>
            <div class="field"><label>Substrato</label><input value="${esc(row.substrato)}" oninput="rdoAtualizarLinhaProducao(${idx},'substrato',this.value)"></div>
            <div class="field"><label>Película</label><input value="${esc(row.pelicula)}" oninput="rdoAtualizarLinhaProducao(${idx},'pelicula',this.value)"></div>
            <div class="field"><label>H (m)</label><input type="number" step="0.01" value="${esc(row.h)}" oninput="rdoAtualizarLinhaProducao(${idx},'h',this.value)"></div>
            <div class="field"><label>L (m)</label><input type="number" step="0.01" value="${esc(row.l)}" oninput="rdoAtualizarLinhaProducao(${idx},'l',this.value)"></div>
            <div class="field"><label>Área m²</label><input value="${row.area||''}" disabled></div>
            <div class="field"><label>Qtda</label><input type="number" value="${esc(row.qtda)}" oninput="rdoAtualizarLinhaProducao(${idx},'qtda',this.value)"></div>
          </div>
        </div>`).join('') || '<div class="empty-state">Nenhuma linha adicionada.</div>'}
      <button type="button" class="btn btn-secondary btn-block" style="margin-top:8px;" onclick="rdoAdicionarLinhaProducao()">+ Adicionar linha</button>
    </div>

    <div class="card">
      <div class="field"><label>Descrição dos serviços executados</label><textarea name="descricao_servicos" rows="3" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;font:inherit;"></textarea></div>
      <div class="field"><label>Observações</label><textarea name="observacoes" rows="3" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;font:inherit;"></textarea></div>
      <div class="field"><label>Assinatura — Encarregado / Resp. Técnico MEGA</label><input name="assinatura_encarregado" required></div>
      <div class="field"><label>Assinatura — Cliente / Fiscalização</label><input name="assinatura_cliente"></div>
      <button class="btn btn-primary btn-block" style="margin-top:12px;" ${S.loading?'disabled':''}>${S.loading?'Salvando…':'Salvar RDO'}</button>
    </div>
  </form>`;
}
async function salvarRDO(form){
  const fd = new FormData(form);
  const equipVeicList = S.rdoTipo==='horizontal'?RDO_EQUIP_HORIZ:RDO_EQUIP_VERT;
  const mao_de_obra = RDO_MAO_DE_OBRA.map(m=>({descricao:m, qtd:parseFloat(fd.get('mo_'+m.replace(/[^a-zA-Z]/g,'_')))||0}));
  const equipamentos_veiculos = equipVeicList.map(m=>({descricao:m, qtd:parseFloat(fd.get('ev_'+m.replace(/[^a-zA-Z]/g,'_')))||0}));
  let materiais_consumidos=[], suportes_materiais=[];
  if(S.rdoTipo==='horizontal'){
    materiais_consumidos = RDO_MATERIAIS_HORIZ.map(([nome,un])=>({descricao:nome, unidade:un, qtd:parseFloat(fd.get('mat_'+nome.replace(/[^a-zA-Z]/g,'_')))||0}));
  } else {
    suportes_materiais = RDO_SUPORTES_VERT.map(m=>{ const k=m.replace(/[^a-zA-Z]/g,'_');
      return {material:m, tamanho:fd.get('sup_'+k+'_tam')||'', estoque:fd.get('sup_'+k+'_est')||'', instalado:fd.get('sup_'+k+'_ins')||'', saldo:fd.get('sup_'+k+'_sal')||''}; });
  }
  const totalM2 = S.rdoTipo==='horizontal'
    ? __rdoProducaoRows.reduce((a,r)=>a+(parseFloat(r.area)||0),0)
    : __rdoProducaoRows.reduce((a,r)=>a+(parseFloat(r.area)||0)*(parseFloat(r.qtda)||1),0);
  const totalItens = S.rdoTipo==='vertical' ? __rdoProducaoRows.reduce((a,r)=>a+(parseFloat(r.qtda)||0),0) : __rdoProducaoRows.length;
  S.loading=true; render();
  try{
    await sb('rdo',{method:'POST',body:{
      tipo:S.rdoTipo, programacao_num:fd.get('programacao_num')||null, data_rdo:fd.get('data_rdo'),
      obra_id:fd.get('obra_id')||null, equipe_id:fd.get('equipe_id')||null, encarregado_id:fd.get('encarregado_id')||null,
      fiscal_cliente:fd.get('fiscal_cliente')||null, epis_ok:fd.get('epis_ok')==='sim', residuos_recolhidos:fd.get('residuos_ok')==='sim',
      tema_dds:fd.get('tema_dds')||null,
      clima:{manha:fd.get('clima_manha'), tarde:fd.get('clima_tarde'), noite:fd.get('clima_noite')},
      local_interdicao:fd.get('local_interdicao')||null, km_prog:fd.get('km_prog')||null, km_inter:fd.get('km_inter')||null,
      horarios:{inicial:fd.get('hora_inicial')||null, final:fd.get('hora_final')||null},
      mao_de_obra, equipamentos_veiculos, materiais_consumidos, suportes_materiais, producao:__rdoProducaoRows,
      total_m2:totalM2, total_itens:totalItens,
      descricao_servicos:fd.get('descricao_servicos')||null, observacoes:fd.get('observacoes')||null,
      assinatura_encarregado:fd.get('assinatura_encarregado'), assinatura_cliente:fd.get('assinatura_cliente')||null,
      status:'fechado', criado_por:S.user.id}});
    toast('RDO salvo com sucesso.'); __rdoProducaoRows=[]; form.reset(); S.rdoView='historico'; await loadRDOList();
  }catch(e){ toast('Erro: '+e.message); }
  S.loading=false; render();
}
function renderRDOHistorico(){
  return (S.rdoList||[]).map(r=>`<div class="mcard"><div class="mc-top"><span>${fmtDateOnly(r.data_rdo)}</span>${badge('andamento',r.tipo==='horizontal'?'Horizontal':'Vertical')}</div>
    <div class="mc-meta">${esc(obraMap()[r.obra_id]?.nome||'—')} · ${esc(equipeMap()[r.equipe_id]?.nome||'—')}</div>
    <div class="mc-meta">Encarregado: ${esc(usuMap()[r.encarregado_id]?.nome||'—')} · Total: ${r.total_m2?parseFloat(r.total_m2).toFixed(1)+' m²':'—'}</div>
  </div>`).join('') || '<div class="empty-state">Nenhum RDO registrado ainda.</div>';
}

function render(){
  const app = document.getElementById('app');
  if(!S.user){ app.innerHTML = renderLogin(); return; }
  let body='';
  if(S.view==='dashboard') body=renderDashboard();
  else if(S.view==='lista') body=renderLista();
  else if(S.view==='nova') body=renderNovaOS();
  else if(S.view==='cadastros') body=renderCadastros();
  else if(S.view==='checklists') body=renderChecklists();
  else if(S.view==='veiculo_checkin') body=renderCheckinVeiculo();
  else if(S.view==='financeiro') body=renderFinanceiro();
  else if(S.view==='permissoes') body=renderPermissoes();
  else if(S.view==='rh') body=renderRH();
  else if(S.view==='dds') body=renderDDS();
  else if(S.view==='suprimentos') body=renderSuprimentos();
  else if(S.view==='dre_sinalizacao') body=renderDreSinalizacao();
  else if(S.view==='epi') body=renderEpi();
  else if(S.view==='seguranca_hub') body=renderSegurancaHub();
  else if(S.view==='mensagens') body=renderMensagens();
  else if(S.view==='rdo') body=renderRDO();
  else if(S.view==='detalhe') body=renderDetalheOS();
  app.innerHTML = renderTopBar() + body + (S.loading?'<div class="spinner"></div>':'') + renderBottomNav();
  if(S.view==='nova'){
    const c = document.getElementById('itens-container');
    if(c && c.children.length===0) addItemRow('itens-container');
  }
}
window.addEventListener('error', function(ev){
  const app = document.getElementById('app');
  if(app) app.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#C0392B;"><b>Erro ao carregar o sistema.</b><br><br>'+esc(ev.message||String(ev.error))+'<br><br><span style="color:#5A5A5A;font-size:13px;">Verifique sua conexão com a internet e recarregue a página.</span></div>';
});
try{ render(); }
catch(e){
  document.getElementById('app').innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#C0392B;"><b>Erro ao iniciar o sistema.</b><br><br>'+String(e.message||e)+'</div>';
}
</script>
</body>
</html>
